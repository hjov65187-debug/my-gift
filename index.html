<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakr Funny World 😂</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap');
        body { margin:0; overflow:hidden; background:#ffcc00; font-family:'Cairo',sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; }
        #ui { position:relative; z-index:10; text-align:center; background:#fff; padding:40px; border-radius:30px; border:5px solid #000; box-shadow: 10px 10px 0px #000; }
        button { padding:15px 50px; background:#ff007f; color:#fff; border:3px solid #000; border-radius:15px; font-size:24px; font-weight:900; cursor:pointer; box-shadow: 5px 5px 0px #000; }
        button:active { transform: translate(3px, 3px); box-shadow: none; }
        #joke-box { display:none; position:fixed; z-index:5; text-align:center; width:90%; color:#000; font-size:45px; font-weight:900; text-shadow: 2px 2px #fff; animation: wobble 2s infinite; }
        @keyframes wobble { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
    </style>
</head>
<body>

    <audio id="funnyMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3" type="audio/mpeg">
    </audio>

    <div id="ui">
        <h1 style="color:#000">عالم بكر الفرفوش 😂</h1>
        <p style="margin-bottom:20px;">دوس دخول واستعد للصدمة!</p>
        <button onclick="startFun()">دخول 🤡</button>
    </div>

    <div id="joke-box"></div>

    <script>
        const jokes = [
            "أنتِ زي باقة النت.. بتخلصي في وقت زنقة 😂",
            "لو الحب طعمية.. فأنتِ الزيت اللي بيغلي فيها 🥙",
            "يا مساء الزبادي.. يا اللي وشك زي الرادي 📻",
            "أنا قلبي محتاج كارت شحن عشان يكمل حبك 📱",
            "يا واد يا مهلبية.. حبك عملي حساسية 😍",
            "أنتِ النسخة الصيني.. بس عاجباني برضه 🇨🇳"
        ];
        
        let i = 0;
        function startFun() {
            document.getElementById('funnyMusic').play();
            document.getElementById('ui').style.display='none';
            const box = document.getElementById('joke-box');
            box.style.display='block';
            
            // الكلام هيتغير كل 5 ثواني
            setInterval(() => {
                box.innerText = jokes[i];
                i = (i + 1) % jokes.length;
            }, 5000);
        }
    </script>
</body>
</html>
