<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
<meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>عالمك الخاص ✨</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
body{margin:0;overflow:hidden;background:#000;font-family:'Cairo',sans-serif;color:#fff}
#ui{position:fixed;z-index:100;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000}
#box{background:rgba(0,0,0,.8);padding:35px;border-radius:25px;border:2px solid #ff007f;text-align:center;box-shadow:0 0 40px #ff007f44}
input{padding:12px;width:140px;text-align:center;font-size:22px;border-radius:10px;border:none;margin-bottom:15px;outline:none}
button{padding:12px 35px;background:#ff007f;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:18px}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}
#countdown,#final-wrap{position:fixed;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;z-index:200;pointer-events:none}
#countdown{font-size:160px;color:#ff007f;text-shadow:0 0 40px #ff007f}
#final-wrap{display:none;flex-direction:column;pointer-events:auto;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px)}
.msg-content{max-width:85%;text-align:center;line-height:1.8;font-size:26px;text-shadow:0 0 15px #ff007f;animation:fadeIn 2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body class="notranslate">
<canvas id="matrix"></canvas>
<div id="countdown"></div>

<div id="final-wrap">
    <div class="msg-content">
        يا بقرتي اللي خطفت قلبي من وسط الكل ❤️<br>
        عاوزك تعرفي إن لو قدامي بنات الدنيا كلها..<br>
        مش هشوف غيرك أنتي، لأنك في عيني أجمل واحدة اتخلقت ✨<br>
        أنتي كوكبي الخاص، ودنيتي اللي بهرب فيها..<br>
        بحبك يا بقرتي الحلوة ومهما حصل هتفضلي أنتي الأولى والأخيرة ❤️
    </div>
    <br>
    <button onclick="location.reload()" style="background:#444">رجوع</button>
</div>

<div id="ui">
    <div id="box">
        <h2 style="color:#ff007f">اكتبي كلمة السر يا قمر ✨</h2>
        <input type="number" id="p" placeholder="2009"><br>
        <button onclick="go()">دخول</button>
    </div>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.height = window.innerHeight; canvas.width = window.innerWidth;

// الكلام الكثير اللي هيقع في المطر الوردي
const words = ["يا بقرتي","أجمل واحدة","يا جاموسة قلبي","بحبك يا عّم","يا حلوة الكون","أنتي ملكي","مفيش غيرك","قمر حياتي","يا دلوعة","ست البنات","أجمل صدفة"];
const columns = Array(Math.floor(canvas.width / 25)).fill(1);
let anim;

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#ff007f";
  ctx.font = "bold 18px 'Cairo'";
  columns.forEach((y, i) => {
    const txt = words[Math.floor(Math.random() * words.length)];
    ctx.fillText(txt, i * 25, y);
    if (y > 150 + Math.random() * 15000) columns[i] = 0;
    else columns[i] = y + 25;
  });
}

function go() {
  if(document.getElementById('p').value=="2009") {
    document.getElementById('ui').style.display='none';
    const cd = document.getElementById('countdown');
    const v = ["3", "2", "1"]; let i = 0;
    cd.style.display = 'flex';
    const itv = setInterval(() => {
      cd.innerText = v[i++];
      if(i > 3) {
        clearInterval(itv); cd.style.display = 'none';
        anim = setInterval(draw, 50); 
        // المطر هيفضل شغال لمدة دقيقة ونصف (90 ثانية) قبل الرسالة الأخيرة
        setTimeout(() => {
          clearInterval(anim);
          document.getElementById('final-wrap').style.display = 'flex';
        }, 90000); 
      }
    }, 1000);
  } else { alert("الباسورد غلط يا قمر!"); }
}
</script>
</body>
</html>
