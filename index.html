<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
<meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>عالم Bakr الخاص ✨</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap');
body{margin:0;overflow:hidden;background:#000;font-family:'Cairo',sans-serif;color:#fff}
#ui{position:fixed;z-index:400;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000}
#box{background:rgba(15,15,15,0.98);padding:40px;border-radius:30px;border:2px solid #ff007f;text-align:center;box-shadow:0 0 50px #ff007f66}
input{padding:12px;width:160px;text-align:center;font-size:24px;border-radius:12px;border:1px solid #ff007f;background:#000;color:#ff007f;margin-bottom:20px;outline:none}
button{padding:12px 50px;background:#ff007f;color:#fff;border:none;border-radius:12px;cursor:pointer;font-weight:900;font-size:22px}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}
#countdown,#final-wrap,#big-words-wrap{position:fixed;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;z-index:300}
#countdown{font-size:180px;color:#ff007f;font-weight:900}
#final-wrap{display:none;flex-direction:column;background:rgba(0,0,0,0.98);pointer-events:auto}
.msg-content{max-width:85%;text-align:center;line-height:1.5;font-size:35px;text-shadow:0 0 20px #ff007f}
#big-words-wrap{display:none;z-index:250;pointer-events:none}
.big-word{font-size:120px;font-weight:900;color:#ff1a75;text-shadow:0 0 40px #ff1a75;text-align:center;animation:fadeEffect 4s infinite}
@keyframes fadeEffect{0%,100%{opacity:0;transform:scale(0.9)}50%{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
</style>
</head>
<body class="notranslate">
<canvas id="matrix"></canvas>
<div id="countdown"></div>
<div id="big-words-wrap"><div class="big-word" id="big-word-text"></div></div>

<audio id="bgMusic" loop>
    <source src="https://f.top4top.io/m_22453v7w91.mp3" type="audio/mpeg">
</audio>

<div id="final-wrap">
    <div class="msg-content">
        يا بقرتي اللي خطفت قلبي 😉❤️<br>
        عليك عيون لا بتنافق ولا بتخون..<br>
        لو لفيت الدنيا مش هلاقي في جمالك..<br>
        أنتي الأصل والباقي كله تقليد ✨<br>
        بحبك يا أجمل واحدة في كوكبي الخاص ❤️😉
    </div>
    <div style="font-size:100px;animation:pulse 1s infinite;margin-top:20px">❤️😉</div>
    <br><button onclick="location.reload()" style="background:#222;font-size:14px">خروج</button>
</div>

<div id="ui">
    <div id="box">
        <h1 style="color:#ff007f;font-size:28px">عالم Bakr ✨</h1>
        <p style="color:#888;margin-bottom:20px">الباسورد يا ست البنات 😉</p>
        <input type="number" id="p" placeholder="2009"><br>
        <button onclick="go()">دخول ❤️</button>
    </div>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.height = window.innerHeight; canvas.width = window.innerWidth;

const words = ["يا بقرتي", "أجمل واحدة", "بحبك", "❤️", "😉"];
const bigWords = ["بقرتي ❤️", "عليك عيون 😉", "أجمل واحدة", "ملكي للأبد ❤️", "بحبك ✨"];
const fontSize = 18;
const columns = Array(Math.floor(canvas.width / 30)).fill(1);
let anim, bigAnim, bIdx = 0;

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.15)"; 
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#ff007f33"; 
  ctx.font = fontSize + "px 'Cairo'";
  columns.forEach((y, i) => {
    const txt = words[Math.floor(Math.random() * words.length)];
    ctx.fillText(txt, i * 30, y);
    if (y > 500 + Math.random() * 10000) columns[i] = 0;
    else columns[i] = y + fontSize + 5;
  });
}

function updateBigWord() {
  document.getElementById('big-word-text').innerText = bigWords[bIdx];
  bIdx = (bIdx + 1) % bigWords.length;
}

function go() {
  if(document.getElementById('p').value=="2009") {
    // تشغيل الأغنية فوراً
    const music = document.getElementById('bgMusic');
    music.play().catch(e => console.log("Music play failed:", e));
    
    document.getElementById('ui').style.display='none';
    const cd = document.getElementById('countdown');
    const v = ["3", "2", "1"]; let i = 0;
    cd.style.display = 'flex';
    const itv = setInterval(() => {
      cd.innerText = v[i++];
      if(i > 3) {
        clearInterval(itv); cd.style.display = 'none';
        anim = setInterval(draw, 60);
        document.getElementById('big-words-wrap').style.display = 'flex';
        updateBigWord();
        bigAnim = setInterval(updateBigWord, 4000);
        setTimeout(() => {
          clearInterval(anim); clearInterval(bigAnim);
          document.getElementById('big-words-wrap').style.display = 'none';
          document.getElementById('final-wrap').style.display = 'flex';
        }, 120000); 
      }
    }, 1000);
  } else { alert("الباسورد غلط يا قمر 😉"); }
}
</script>
</body>
</html>
