<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم بكر الـ 3D ✨</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Cairo', sans-serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); z-index: 10; color: white; transition: 0.5s;
        }
        button {
            padding: 15px 40px; font-size: 20px; cursor: pointer; border-radius: 50px;
            border: 2px solid #ff007f; background: transparent; color: #ff007f;
            box-shadow: 0 0 20px #ff007f; transition: 0.3s;
        }
        button:hover { background: #ff007f; color: white; }
        #caption {
            position: absolute; bottom: 50px; width: 100%; text-align: center;
            color: white; font-size: 24px; z-index: 5; text-shadow: 0 0 10px #ff007f;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>مرحباً بك في عالم بكر ✨</h1>
        <button onclick="init()">اضغط للبدء 🚀</button>
    </div>

    <div id="caption">Only For You.. Bakr ✨</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <audio id="bgMusic" loop>
        <source src="https://files.catbox.moe/p9p33e.mp3" type="audio/mpeg">
    </audio>

    <script>
        let scene, camera, renderer, stars, cloud;

        function init() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 500);
            
            document.getElementById('bgMusic').play();

            // إنشاء المشهد
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 1;
            camera.rotation.x = Math.PI/2;

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // إنشاء النجوم (النقاط البيضاء والملونة)
            let starGeo = new THREE.BufferGeometry();
            let positions = [];
            for(let i=0; i<6000; i++) {
                positions.push(Math.random() * 600 - 300);
                positions.push(Math.random() * 600 - 300);
                positions.push(Math.random() * 600 - 300);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            let starMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.7
            });
            stars = new THREE.Points(starGeo, starMaterial);
            scene.add(stars);

            // إضافة تأثير الكرة الحمراء في المنتصف
            let sphereGeo = new THREE.SphereGeometry(5, 32, 32);
            let sphereMat = new THREE.MeshBasicMaterial({ color: 0xff0044, wireframe: true });
            let core = new THREE.Mesh(sphereGeo, sphereMat);
            scene.add(core);

            animate();
        }

        function animate() {
            stars.rotation.y += 0.002;
            stars.rotation.x += 0.001;
            
            // تحريك الكاميرا لإعطاء شعور الطيران
            camera.position.z -= 0.1;
            if(camera.position.z < -100) camera.position.z = 1;

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
