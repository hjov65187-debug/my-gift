<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
<meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>3D Planet</title>
<style>body{margin:0;overflow:hidden;background:#000}#ui{position:fixed;z-index:100;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle,transparent,#000)}#box{background:rgba(0,0,0,.8);padding:30px;border-radius:20px;border:2px solid #ff4d6d;text-align:center;color:#white;backdrop-filter:blur(10px)}input{padding:12px;width:120px;text-align:center;font-size:20px;border-radius:8px;border:none;margin-bottom:15px}button{padding:10px 30px;background:#ff4d6d;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700}#m{display:none;position:fixed;top:20%;width:100%;text-align:center;z-index:200;color:#fff;font-size:32px;font-weight:700;text-shadow:0 0 20px #ff4d6d}</style>
</head>
<body>
<div id="m"></div>
<div id="ui"><div id="box"><h2 style="color:#ff4d6d">عالم حبنا 3D ✨</h2>
<input type="number" id="p" placeholder="2007"><br>
<button onclick="go()">دخول</button></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let s,c,r,g,st;const w=["يا ست البنات ❤️","يا بقرتي الحلوة ✨","بحبك للأبد ❤️"];let idx=0;
function init(){s=new THREE.Scene();c=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,.1,1000);r=new THREE.WebGLRenderer({antialias:true});r.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(r.domElement);g=new THREE.Mesh(new THREE.SphereGeometry(2,64,64),new THREE.MeshPhongMaterial({color:0xff0055,emissive:0x330011}));s.add(g);let sg=new THREE.BufferGeometry();let sp=[];for(let i=0;i<5000;i++)sp.push((Math.random()-.5)*100,(Math.random()-.5)*100,(Math.random()-.5)*100);sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));st=new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:.05}));s.add(st);let l=new THREE.PointLight(0xffffff,1.5);l.position.set(10,10,10);s.add(l);c.position.z=7;loop()}
function go(){const val=document.getElementById('p').value;if(val=="2007"){document.getElementById('ui').style.display='none';document.getElementById('m').style.display='block';setInterval(()=>{document.getElementById('m').innerText=w[idx];idx=(idx+1)%w.length},3000)}else{alert("اكتبي 2007")}}
function loop(){requestAnimationFrame(loop);g.rotation.y+=.005;st.rotation.y-=.0001;let t=Date.now()*.0005;c.position.x=Math.sin(t)*6;c.position.z=Math.cos(t)*6;c.lookAt(g.position);r.render(s,c)}
init();
</script>
</body>
</html>
