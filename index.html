<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Bakr Vibe ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Cairo', sans-serif; }
        
        /* خلفية بلور متحركة ببطء (Aesthetic Gradient) */
        #bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(120deg, #1d3557, #457b9d, #a8dadc, #f1faee);
            background-size: 400% 400%; animation: gradientBg 15s ease infinite; filter: blur(50px);
            z-index: -1;
        }
        @keyframes gradientBg { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); z-index: 20; color: white; text-align: center;
        }
        button {
            padding: 15px 50px; font-size: 22px; cursor: pointer; border-radius: 50px;
            border: 2px solid #00ffff; background: transparent; color: #00ffff;
            box-shadow: 0 0 20px #00ffff; transition: 0.3s; font-weight: bold;
        }
        #lyrics-box {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 15; text-align: center; width: 80%;
            color: #fff; font-size: 35px; font-weight: 900; 
            text-shadow: 0 0 20px #00ffff, 0 0 40px #000;
            pointer-events: none; animation: smoothFade 8s infinite;
        }
        @keyframes smoothFade { 0%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); filter: blur(5px); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); filter: blur(0); } }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div id="overlay">
        <h1 style="color:#00ffff">عالم بكر الخاص ✨</h1>
        <p>القلب الأزرق السحري مستنيك 😉</p>
        <button onclick="start()">دخول للروقان 😉✨</button>
    </div>

    <div id="lyrics-box"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const flirtLines = [
            "يا بقر قلبي ده أنا ماليش غيرك في الدنيا 😉",
            "بكرة نتجوز ويجمعنا بيت واحد ونخلص من الحوارات دي 😂",
            "أنتِ زي النت في مصر.. بتقطعي قلبي بس ماليش غيرك ❤️",
            "لو الحب طعمية فأنتِ السندوتش كله يا روحي 😉",
            "يا مساء العسل.. على اللي شاغل البال ومخليني أهبل 😂",
            "بكرة نبني عشنا.. ونآكل ملوخية في بيتنا 😉🏠",
            "أنتِ النسخة الأصلية.. والباقي كله تقليد 😉",
            "خلاص كدة.. ده كان كل اللي عندي يا قمر ❤️",
            "1.1.2009 ✨" // التاريخ في النهاية
        ];

        let scene, camera, renderer, mainHeart, sparkles = [];
        let lineIdx = 0;

        function start() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('lyrics-box').style.display = 'block';
            document.getElementById('lyrics-box').innerText = flirtLines[lineIdx];

            setInterval(() => {
                lineIdx++;
                if(lineIdx < flirtLines.length) {
                    document.getElementById('lyrics-box').innerText = flirtLines[lineIdx];
                } else if(lineIdx == flirtLines.length - 1) {
                   // التاريخ يفضل ظاهر في النهاية
                } else {
                    document.getElementById('lyrics-box').innerText = "";
                    document.getElementById('lyrics-box').style.display = 'none';
                }
            }, 8000); 

            init3D();
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); // Alpha لخلفية شفافة
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // القلب الـ 3D الأزرق الطويل والمخرم
            function createHeartShape() {
                const heartShape = new THREE.Shape();
                heartShape.moveTo(0, 0);
                heartShape.bezierCurveTo(0, -3, -5, -15, -20, -15);
                heartShape.bezierCurveTo(-35, -15, -35, 7, -35, 7);
                heartShape.bezierCurveTo(-35, 16, -25, 25, 0, 35);
                heartShape.bezierCurveTo(25, 25, 35, 16, 35, 7);
                heartShape.bezierCurveTo(35, 7, 35, -15, 20, -15);
                heartShape.bezierCurveTo(10, -15, 0, -3, 0, 0);
                return heartShape;
            }

            const extrudeSettings = { depth: 2, bevelEnabled: true, bevelSegments: 2, steps: 2, bevelSize: 0.5, bevelThickness: 0.5 };
            const heartGeo = new THREE.ExtrudeGeometry(createHeartShape(), extrudeSettings);
            const heartMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.9 });
            mainHeart = new THREE.Group();

            const largeHeart = new THREE.Mesh(heartGeo, heartMat);
            largeHeart.scale.set(0.4, 0.6, 0.4); // ممطوط
            largeHeart.rotation.z = Math.PI;
            mainHeart.add(largeHeart);

            // التخريم بقلوب صغيرة جواه
            for(let i=0; i<10; i++) {
                let punchHeart = new THREE.Mesh(heartGeo, heartMat);
                punchHeart.scale.set(0.04, 0.04, 0.04);
                punchHeart.rotation.z = Math.PI;
                punchHeart.position.set(Math.random()*15-7.5, Math.random()*25-12.5, 0);
                mainHeart.add(punchHeart);
            }
            scene.add(mainHeart);

            // بديل النجوم: نقط بتلمع (Sparkles) كثيفة
            const sparkleGeo = new THREE.BufferGeometry();
            const sparklePos = [];
            const sparkleColors = [];
            for(let i=0; i<7000; i++) {
                sparklePos.push(Math.random()*600-300, Math.random()*600-300, Math.random()*600-300);
                sparkleColors.push(0, 1, 1); // أزرق نيون
            }
            sparkleGeo.setAttribute('position', new THREE.Float32BufferAttribute(sparklePos, 3));
            sparkleGeo.setAttribute('color', new THREE.Float32BufferAttribute(sparkleColors, 3));
            sparkles = new THREE.Points(sparkleGeo, new THREE.PointsMaterial({color: 0x00ffff, size: 0.6, vertexColors: true, transparent: true, opacity: 0.7}));
            scene.add(sparkles);

            function animate() {
                requestAnimationFrame(animate);
                mainHeart.rotation.y += 0.01;
                // دوامة من الـ Sparkles حوالين القلب
                sparkles.rotation.y += 0.005;
                sparkles.rotation.x += 0.002;
                renderer.render(scene, camera);
            }
            animate();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
