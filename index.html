<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم بكر الرايق ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Cairo', sans-serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9); z-index: 10; color: white; text-align: center;
        }
        button {
            padding: 15px 50px; font-size: 22px; cursor: pointer; border-radius: 50px;
            border: 2px solid #00d2ff; background: transparent; color: #00d2ff;
            box-shadow: 0 0 20px #00d2ff; transition: 0.3s; margin-top: 20px; font-weight: bold;
        }
        #lyrics-box {
            display: none; position: fixed; z-index: 5; text-align: center; width: 90%;
            color: #fff; font-size: 35px; font-weight: 900; text-shadow: 0 0 15px #00d2ff;
            bottom: 15%; animation: floatText 5s infinite;
        }
        @keyframes floatText { 0%, 100% { opacity: 0; transform: translateY(10px); } 50% { opacity: 1; transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:#00d2ff">عالم بكر ✨</h1>
        <p>استعد لأهدى جيتار وأجمد مغازلة 😉</p>
        <button onclick="startExperience()">دخول للروقان ❤️</button>
    </div>

    <div id="lyrics-box"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-13.mp3" type="audio/mpeg">
    </audio>

    <script>
        const flirtLines = [
            "أنتِ زي باقة النت.. بتخلصي بس ماليش غيرك 😉",
            "لو الحب طعمية.. فأنتِ السندوتش كله يا قمر 🥙",
            "يا مساء الفراولة.. يا اللي جمالك عامل محاولة 🍓",
            "أنا قلبي محتاج شاحن أصلي عشان يكمل حبك 🔋",
            "يا واد يا مربى.. في حبك قلبي اتدبى 😍",
            "عنيكي فيها كهربا.. كهروباء السد العالي ⚡",
            "أنتِ النسخة الأصلية.. والباقي كله تقليد 😉"
        ];

        let scene, camera, renderer, stars, core;
        let lineIdx = 0;

        function startExperience() {
            document.getElementById('bgMusic').play();
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('lyrics-box').style.display = 'block';

            // تبديل الكلام كل 5 ثواني
            setInterval(() => {
                document.getElementById('lyrics-box').innerText = flirtLines[lineIdx];
                lineIdx = (lineIdx + 1) % flirtLines.length;
            }, 5000);

            init3D();
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 1;
            camera.rotation.x = Math.PI/2;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // النجوم الطائرة
            let starGeo = new THREE.BufferGeometry();
            let positions = [];
            for(let i=0; i<8000; i++) {
                positions.push(Math.random() * 600 - 300);
                positions.push(Math.random() * 600 - 300);
                positions.push(Math.random() * 600 - 300);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            let starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.6 });
            stars = new THREE.Points(starGeo, starMaterial);
            scene.add(stars);

            // النواة اللي في النص زي الفيديو
            let coreGeo = new THREE.SphereGeometry(12, 32, 32);
            let coreMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true });
            core = new THREE.Mesh(coreGeo, coreMat);
            scene.add(core);

            function animate() {
                stars.rotation.y += 0.0015;
                core.rotation.y += 0.005;
                core.rotation.x += 0.005;
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
            animate();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
