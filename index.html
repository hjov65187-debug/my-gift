<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم Bakr ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap');
        body{margin:0;overflow:hidden;background:#000;font-family:'Cairo',sans-serif;color:#fff}
        #ui{position:fixed;z-index:400;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000}
        #box{background:rgba(10,10,10,0.98);padding:35px;border-radius:30px;border:2px solid #ff007f;text-align:center;box-shadow:0 0 50px #ff007f66}
        input{padding:12px;width:160px;text-align:center;font-size:24px;border-radius:12px;border:1px solid #ff007f;background:#000;color:#ff007f;margin-bottom:20px;outline:none}
        button{padding:12px 50px;background:#ff007f;color:#fff;border:none;border-radius:12px;cursor:pointer;font-weight:900;font-size:22px}
        canvas{display:block;position:fixed;top:0;left:0;z-index:1}
        #big-words-wrap{position:fixed;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;z-index:300;pointer-events:none}
        .big-word{font-size:45px;font-weight:900;color:#ff1a75;text-shadow:0 0 40px #ff1a75;text-align:center;animation:fade 4.8s infinite;padding:25px;line-height:1.5}
        @keyframes fade{0%,100%{opacity:0;transform:scale(0.85)}50%{opacity:1;transform:scale(1)}}
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <audio id="bgMusic" preload="auto" loop>
        <source src="https://files.catbox.moe/606v9p.mp3" type="audio/mpeg">
    </audio>

    <div id="ui">
        <div id="box">
            <h1 style="color:#ff007f">عالم Bakr ✨</h1>
            <input type="number" id="p" placeholder="2009">
            <br>
            <button onclick="go()">دخول ❤️</button>
        </div>
    </div>

    <div id="big-words-wrap"><div class="big-word" id="big-word-text"></div></div>

    <script>
        const canvas = document.getElementById("matrix");
        const ctx = canvas.getContext("2d");
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;

        // مطر القلوب والكلمات في الخلفية
        const rainWords = ["❤️", "😉", "Bakr", "حب", "✨"];
        const fontSize = 20;
        const columns = Array(Math.floor(canvas.width / 30)).fill(1);

        function drawRain() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff007f33"; 
            ctx.font = fontSize + "px 'Cairo'";
            columns.forEach((y, i) => {
                const text = rainWords[Math.floor(Math.random() * rainWords.length)];
                ctx.fillText(text, i * 30, y);
                if (y > canvas.height + Math.random() * 10000) columns[i] = 0;
                else columns[i] = y + fontSize + 5;
            });
        }

        // كلمات أغنية محمد سعيد - جمل متلاصقة
        const lyrics = [
            "وقالوا عليكي إن أنتِ عينيكي 😉",
            "قاسية ومافيش فيها مكان ❤️",
            "يمكن حبيتي ورحتي وجيتي ✨",
            "واتنسيتي مع الأيام",
            "وقالوا عليكي إن أنتِ بقيتي ❤️",
            "حد ناسي لنفسه زمان",
            "يمكن حبيتي ورحتي وجيتي ✨",
            "واتنسيتي مع الأيام 😉",
            "أنا فعلاً عرفت أختار ❤️"
        ];
        
        let lIdx = 0;

        function updateLyrics() {
            if(lIdx < lyrics.length) {
                document.getElementById('big-word-text').innerText = lyrics[lIdx++];
            }
        }

        function go() {
            if(document.getElementById('p').value=="2009") {
                const music = document.getElementById('bgMusic');
                
                // تشغيل الصوت مع محاولة فك الحظر
                music.play().catch(() => {
                    // لو المتصفح حظر الصوت، هيشتغل مع أول لمسة بعد الضغط على الزرار
                    console.log("Audio blocked, fallback to interaction");
                    music.play();
                });

                document.getElementById('ui').style.display='none';
                document.getElementById('big-words-wrap').style.display = 'flex';
                
                // تشغيل مطر الخلفية
                setInterval(drawRain, 60);
                
                // تشغيل الكلمات بالتوقيت المظبوط
                updateLyrics();
                setInterval(updateLyrics, 4800); 
            } else { alert("الباسورد غلط!"); }
        }
    </script>
</body>
</html>
