<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
<meta charset="UTF-8"><meta name="google" content="notranslate"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bakr's Universe ✨</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap');
body{margin:0;overflow:hidden;background:#000;font-family:'Cairo',sans-serif;color:#fff}
#ui{position:fixed;z-index:300;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000}
#box{background:rgba(20,20,20,0.95);padding:45px;border-radius:35px;border:3px solid #ff007f;text-align:center;box-shadow:0 0 70px #ff007f99;backdrop-filter:blur(15px)}
input{padding:15px;width:180px;text-align:center;font-size:28px;border-radius:15px;border:2px solid #ff007f;background:#000;color:#ff007f;margin-bottom:20px;outline:none;font-weight:900}
button{padding:15px 60px;background:#ff007f;color:#fff;border:none;border-radius:15px;cursor:pointer;font-weight:900;font-size:24px;transition:0.3s}
button:hover{transform:scale(1.1);box-shadow:0 0 30px #ff007f}
canvas{display:block;position:fixed;top:0;left:0;z-index:1}
#countdown,#final-wrap,#big-words-wrap{position:fixed;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;z-index:250}
#countdown{font-size:220px;color:#ff007f;text-shadow:0 0 60px #ff007f;font-weight:900}
#final-wrap{display:none;flex-direction:column;background:rgba(0,0,0,0.97);pointer-events:auto}
.msg-content{max-width:90%;text-align:center;line-height:1.4;font-size:38px;text-shadow:0 0 30px #ff007f;animation:float 3s infinite ease-in-out}
#big-words-wrap{display:none;z-index:200;pointer-events:none}
.big-word{font-size:160px;font-weight:900;color:#ff1a75;text-shadow:0 0 50px #ff1a75, 0 0 100px #ff1a75;text-align:center;animation:zoomInOut 3s infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-25px)}}
@keyframes zoomInOut{0%,100%{transform:scale(0.8);opacity:0}50%{transform:scale(1.2);opacity:1}}
</style>
</head>
<body class="notranslate">
<canvas id="matrix"></canvas>
<div id="countdown"></div>

<div id="big-words-wrap">
    <div class="big-word" id="big-word-text"></div>
</div>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
</audio>

<div id="final-wrap">
    <div class="msg-content">
        يا بقرتي اللي مفيش منها اتنين.. ❤️<br>
        لو لفيت الدنيا كعب داير ولقيت بنات بعدد النجوم..<br>
        مش هشوف غيرك، لأنك "الأصل" والباقي تقليد ✨<br>
        بحبك يا أجمل صدفة في حياتي، وهتفضلي ملكي للأبد! ❤️
    </div>
    <div style="font-size:120px;animation:pulse 1s infinite">❤️</div>
    <br><button onclick="location.reload()" style="background:#333;font-size:16px;padding:12px 25px">إغلاق العالم الخاص</button>
</div>

<div id="ui">
    <div id="box">
        <h1 style="color:#ff007f;font-size:35px;margin-bottom:15px">عالم Bakr الخاص ✨</h1>
        <p style="color:#ddd;font-size:18px;margin-bottom:30px">ممنوع الدخول لغير "ست البنات"</p>
        <input type="number" id="p" placeholder="2009"><br>
        <button onclick="go()">دخول يا قمر</button>
    </div>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.height = window.innerHeight; canvas.width = window.innerWidth;

const words = ["يا بقرتي", "أجمل واحدة", "يا جاموسة", "بحبك", "يا حلوة", "ملكي", "قمر", "ست البنات", "❤️"];
const bigWords = ["بقرتي ❤️", "أجمل واحدة", "يا جاموسة", "بحبك للأبد", "ملكي ✨", "حلوة الكون"];
const fontSize = 35;
const columns = Array(Math.floor(canvas.width / 50)).fill(1);
let anim, bigAnim, bIdx = 0;

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.12)"; 
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  columns.forEach((y, i) => {
    const txt = words[Math.floor(Math.random() * words.length)];
    ctx.fillStyle = Math.random() > 0.85 ? "#fff" : "#ff007f";
    ctx.font = "900 " + fontSize + "px 'Cairo'";
    ctx.fillText(txt, i * 50, y);
    if (y > 300 + Math.random() * 15000) columns[i] = 0;
    else columns[i] = y + fontSize + 8;
  });
}

function updateBigWord() {
  const el = document.getElementById('big-word-text');
  el.innerText = bigWords[bIdx];
  bIdx = (bIdx + 1) % bigWords.length;
}

function go() {
  if(document.getElementById('p').value=="2009") {
    const audio = document.getElementById('bgMusic');
    audio.volume = 0.5;
    audio.play();
    
    document.getElementById('ui').style.display='none';
    const cd = document.getElementById('countdown');
    const v = ["3", "2", "1"]; let i = 0;
    cd.style.display = 'flex';
    
    const itv = setInterval(() => {
      cd.innerText = v[i++];
      if(i > 3) {
        clearInterval(itv); cd.style.display = 'none';
        anim = setInterval(draw, 50);
        document.getElementById('big-words-wrap').style.display = 'flex';
        updateBigWord();
        bigAnim = setInterval(updateBigWord, 3000);
        
        setTimeout(() => {
          clearInterval(anim);
          clearInterval(bigAnim);
          document.getElementById('big-words-wrap').style.display = 'none';
          document.getElementById('final-wrap').style.display = 'flex';
        }, 120000); 
      }
    }, 1000);
  } else { alert("الباسورد 2009 يا قمر!"); }
}
</script>
</body>
</html>
